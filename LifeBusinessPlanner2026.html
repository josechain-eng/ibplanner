<!-- Service Worker registration (enables offline use + install prompt) -->
<script>
(function() {
  // ── Version ──────────────────────────────────────────────────────────────
  window.LBP_VERSION = '4.94';

  // ── PWA Install prompt ───────────────────────────────────────────────────
  window._installPrompt = null;
  window._canInstall = false;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._installPrompt = e;
    window._canInstall = true;
    window.dispatchEvent(new Event('lbp_can_install'));
  });
  window.addEventListener('appinstalled', function() {
    window._installPrompt = null;
    window._canInstall = false;
    window.dispatchEvent(new Event('lbp_installed'));
  });
  // ── Cloud Worker URL (set this after deploying your Cloudflare Worker) ──
  window.LBP_WORKER_URL = localStorage.getItem('lbp_worker_url') || '';
  // VAPID public key matching the Worker
  window.LBP_VAPID_KEY = 'BApPK_6j13xSMZOEpBPK2lUtfH02sSarLJ8469bpbULrUYe4u4mMnNTG8QNUl2FajsOZo_D2CohQ98j1HzArmD0';

  function _workerFetch(path, opts) {
    if (!window.LBP_WORKER_URL) return Promise.resolve(null);
    return fetch(window.LBP_WORKER_URL + path, opts).catch(function() { return null; });
  }

  // ── Google Calendar Sync ──
  window.LBP_GCAL_CLIENT_ID = '993727258805-si855uvstk539r0qevfronjr5u4p1mgh.apps.googleusercontent.com';
  window.LBP_GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.readonly';
  window._gcalToken = null;
  window._gcalTokenExpiry = 0;
  window._gcalTokenClient = null;
  var _gcalPendingCbs = [];

  window._gcalInitGIS = function() {
    if (!window.google || !window.google.accounts || window._gcalTokenClient) return;
    window._gcalTokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: window.LBP_GCAL_CLIENT_ID,
      scope: window.LBP_GCAL_SCOPE,
      callback: function(tokenResponse) {
        if (tokenResponse && tokenResponse.error) {
          _gcalPendingCbs.forEach(function(cb) { try { cb(null); } catch(e){} });
          _gcalPendingCbs = [];
          window.dispatchEvent(new Event('lbp_gcal_error'));
          return;
        }
        window._gcalToken = tokenResponse.access_token;
        window._gcalTokenExpiry = Date.now() + ((tokenResponse.expires_in || 3600) - 120) * 1000;
        localStorage.setItem('lbp_gcal_connected', '1');
        // Persist token so page reloads don't force re-auth
        try {
          localStorage.setItem('lbp_gcal_token', tokenResponse.access_token);
          localStorage.setItem('lbp_gcal_token_expiry', String(window._gcalTokenExpiry));
        } catch(_e) {}
        // Proactive silent refresh 5 min before expiry (avoids mid-session interruption)
        if (window._gcalRefreshTimer) clearTimeout(window._gcalRefreshTimer);
        var _refreshIn = Math.max(30000, window._gcalTokenExpiry - Date.now() - 300000);
        window._gcalRefreshTimer = setTimeout(function() {
          if (window._gcalTokenClient) {
            try { window._gcalTokenClient.requestAccessToken({ prompt: '' }); } catch(_e2) {}
          }
        }, _refreshIn);
        window.dispatchEvent(new Event('lbp_gcal_authed'));
        var cbs = _gcalPendingCbs.slice(); _gcalPendingCbs = [];
        cbs.forEach(function(cb) { try { cb(window._gcalToken); } catch(e){} });
        // Flush any meetings that were queued while token was unavailable
        if (window._gcalFlushPushQueue) window._gcalFlushPushQueue();
      }
    });
    // No auto-reconnect on load — on mobile it causes a full-page redirect to Google sign-in.
    // Token is obtained on-demand via _gcalEnsureToken when a calendar action is triggered.
  };

  window._gcalConnect = function() {
    if (!window._gcalTokenClient) { alert('Google Sign-In library not loaded yet. Please wait a moment and try again.'); return; }
    window._gcalTokenClient.requestAccessToken({ prompt: 'consent' });
  };

  window._gcalDisconnect = function() {
    if (window._gcalToken && window.google && window.google.accounts) {
      try { window.google.accounts.oauth2.revoke(window._gcalToken, function(){}); } catch(e){}
    }
    window._gcalToken = null;
    window._gcalTokenExpiry = 0;
    if (window._gcalRefreshTimer) { clearTimeout(window._gcalRefreshTimer); window._gcalRefreshTimer = null; }
    localStorage.removeItem('lbp_gcal_connected');
    localStorage.removeItem('lbp_gcal_token');
    localStorage.removeItem('lbp_gcal_token_expiry');
    window.dispatchEvent(new Event('lbp_gcal_disconnected'));
  };

  window._gcalEnsureToken = function(cb) {
    // 1. Valid in-memory token
    if (window._gcalToken && window._gcalTokenExpiry > Date.now()) { cb(window._gcalToken); return; }
    // 2. Valid token persisted in localStorage (survives page reloads)
    try {
      var _lsTok = localStorage.getItem('lbp_gcal_token');
      var _lsExp = parseInt(localStorage.getItem('lbp_gcal_token_expiry') || '0');
      if (_lsTok && _lsExp > Date.now() + 60000) {
        window._gcalToken = _lsTok;
        window._gcalTokenExpiry = _lsExp;
        cb(_lsTok);
        return;
      }
    } catch(_e) {}
    // 3. Silent refresh — no popup if user still has active Google session
    if (!window._gcalTokenClient) { cb(null); return; }
    _gcalPendingCbs.push(cb);
    if (_gcalPendingCbs.length === 1) {
      try { window._gcalTokenClient.requestAccessToken({ prompt: '' }); } catch(e) { _gcalPendingCbs = []; cb(null); }
    }
  };

  window._gcalFlushPushQueue = function() {
    // Flush explicitly queued meetings
    var q = window._gcalPushQueue || [];
    window._gcalPushQueue = [];
    q.forEach(function(m){ window._gcalPush(m); });
    // Also auto-sync any meetings that never got a gcalEventId
    setTimeout(function() {
      var d = window._getDataGlobal && window._getDataGlobal();
      if (!d || !d.meetings) return;
      var unsynced = d.meetings.filter(function(m) {
        return !m.gcalEventId && m.status !== 'CANCELLED';
      });
      if (unsynced.length > 0) {
        console.log('[LBP GCal] Auto-syncing', unsynced.length, 'unsynced meetings...');
        unsynced.forEach(function(m) { window._gcalPush(m); });
      }
    }, 1500); // small delay to let React render and expose data
  };

  window._gcalPush = function(meeting) {
    if (!meeting || !meeting.id) return;
    window._gcalEnsureToken(function(token) {
      if (!token) {
        if (!window._gcalPushQueue) window._gcalPushQueue = [];
        window._gcalPushQueue = window._gcalPushQueue.filter(function(m){return m.id!==meeting.id;});
        window._gcalPushQueue.push(meeting);
        window.dispatchEvent(new CustomEvent('lbp_gcal_push_queued',{detail:{count:window._gcalPushQueue.length}}));
        return;
      }
      var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      var startDt = meeting.date + 'T' + (meeting.startTime || '09:00') + ':00';
      var endDt = meeting.date + 'T' + (meeting.endTime || meeting.startTime || '10:00') + ':00';
      var body = JSON.stringify({
        summary: meeting.title || 'Meeting',
        description: [meeting.agenda, meeting.notes].filter(Boolean).join('\n\n'),
        location: meeting.location || '',
        start: { dateTime: startDt, timeZone: tz },
        end: { dateTime: endDt, timeZone: tz },
        extendedProperties: { private: { lbpId: meeting.id } }
      });
      var method = meeting.gcalEventId ? 'PUT' : 'POST';
      var url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events' + (meeting.gcalEventId ? '/' + meeting.gcalEventId : '');
      fetch(url, { method: method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: body })
        .then(function(r) {
          if (!r.ok) {
            return r.json().catch(function(){return {};}).then(function(errBody) {
              var msg = (errBody && errBody.error && errBody.error.message) || ('HTTP ' + r.status);
              // 404 on PUT = event was deleted from GCal externally, re-create as POST
              if (r.status === 404 && method === 'PUT') {
                console.warn('[LBP GCal] Event not found in GCal (deleted externally), re-creating:', meeting.title);
                window.dispatchEvent(new CustomEvent('lbp_gcal_event_id', { detail: { lbpId: meeting.id, gcalEventId: null } }));
                fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                  body: body
                }).then(function(r2) { return r2.ok ? r2.json() : null; }).then(function(ev2) {
                  if (ev2 && ev2.id) {
                    window.dispatchEvent(new CustomEvent('lbp_gcal_event_id', { detail: { lbpId: meeting.id, gcalEventId: ev2.id } }));
                    if (window._addToastGlobal) window._addToastGlobal({id:uid(),title:'\u2705 Google Calendar',body:'Reuni\u00f3n re-creada: '+meeting.title});
                  }
                }).catch(function(){});
                return null;
              }
              console.error('[LBP GCal] Sync failed:', r.status, msg, errBody);
              if (window._addToastGlobal) window._addToastGlobal({id:uid(),title:'\u274C GCal sync failed',body:msg});
              return null;
            });
          }
          return r.json();
        })
        .then(function(ev) {
          if (ev && ev.id) {
            if (!meeting.gcalEventId) {
              window.dispatchEvent(new CustomEvent('lbp_gcal_event_id', { detail: { lbpId: meeting.id, gcalEventId: ev.id } }));
            }
            if (window._addToastGlobal) window._addToastGlobal({id:uid(),title:'\u2705 Google Calendar',body:'Reuni\u00f3n sincronizada: '+meeting.title});
          }
        })
        .catch(function(e) {
          console.error('[LBP GCal] Network error:', e);
          if (window._addToastGlobal) window._addToastGlobal({id:uid(),title:'\u274C GCal: error de red',body:'Verifica tu conexi\u00f3n e intenta de nuevo'});
        });
    });
  };

  window._gcalDeleteEvent = function(gcalEventId) {
    if (!gcalEventId) return;
    window._gcalEnsureToken(function(token) {
      if (!token) return;
      fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/' + gcalEventId, {
        method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
      }).catch(function(){});
    });
  };

  window._gcalPull = function(setDataFn) {
    window._gcalEnsureToken(function(token) {
      if (!token || typeof setDataFn !== 'function') return;
      var timeMin = new Date().toISOString();
      var timeMax = new Date(Date.now() + 60 * 24 * 3600000).toISOString();
      fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=' + encodeURIComponent(timeMin) + '&timeMax=' + encodeURIComponent(timeMax) + '&singleEvents=true&orderBy=startTime&maxResults=250', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(function(r) { return r.ok ? r.json() : null; })
        .then(function(resp) {
          if (!resp || !resp.items) return;
          setDataFn(function(d) {
            var existing = (d.meetings || []).slice();
            resp.items.forEach(function(ev) {
              if (!ev.start || ev.status === 'cancelled') return;
              var lbpId = ev.extendedProperties && ev.extendedProperties.private && ev.extendedProperties.private.lbpId;
              if (lbpId) {
                // Our own event — store gcalEventId if missing
                var idx = existing.findIndex(function(m) { return m.id === lbpId; });
                if (idx >= 0 && !existing[idx].gcalEventId) {
                  existing[idx] = Object.assign({}, existing[idx], { gcalEventId: ev.id });
                }
                return;
              }
              // External Google Calendar event — import if not already present
              if (existing.find(function(m) { return m.gcalEventId === ev.id; })) return;
              var startDate = ev.start.date || (ev.start.dateTime || '').slice(0, 10);
              var startTime = ev.start.dateTime ? ev.start.dateTime.slice(11, 16) : '00:00';
              var endTime = ev.end && ev.end.dateTime ? ev.end.dateTime.slice(11, 16) : startTime;
              existing.push({
                id: 'gcal_' + ev.id.replace(/[^a-z0-9]/gi,''),
                gcalEventId: ev.id,
                title: ev.summary || '(No title)',
                date: startDate,
                startTime: startTime,
                endTime: endTime,
                location: ev.location || '',
                notes: ev.description || '',
                agenda: '',
                status: 'SCHEDULED',
                isOnline: !!(ev.hangoutLink || (ev.conferenceData && ev.conferenceData.entryPoints)),
                createdAt: ev.created || new Date().toISOString(),
                fromGcal: true
              });
            });
            return Object.assign({}, d, { meetings: existing });
          });
          window.dispatchEvent(new Event('lbp_gcal_pulled'));
        }).catch(function(){});
    });
  };

  // ── Gmail search for Meeting Prep ──────────────────────────────────────
  // Searches Gmail for emails related to a meeting/client and returns snippets
  // Requires gmail.readonly scope (included in LBP_GCAL_SCOPE above)
  window._gmailSearchMeeting = function(clientName, meetingTitle, contactPerson, callback) {
    window._gcalEnsureToken(function(token) {
      if (!token) { callback(null); return; }
      // Build Gmail search query: client as anchor (AND), topic keywords use OR
      // Good title example: "Construcción Tienda Ventura Sur" with client "Mango"
      // → query: Mango (Construcción OR Tienda OR Ventura) newer_than:90d
      var stopWords = new Set(['para','con','del','los','las','una','que','por','como','sobre','esta','este','reunion','meeting','call','follow','update','weekly','review','con','the','and','for','with','from','about','sin','sus','son','ser','han','hay','fue','era']);
      var topicKeywords = [];
      if (meetingTitle) {
        meetingTitle.split(/\s+/).forEach(function(w) {
          var clean = w.toLowerCase().replace(/[^a-záéíóúüñ]/gi, '');
          if (clean.length > 3 && !stopWords.has(clean)) topicKeywords.push(w);
        });
      }
      // Limit to 5 most specific keywords
      topicKeywords = topicKeywords.slice(0, 5);

      var q;
      var clientFirst = clientName ? clientName.split(' ')[0] : '';

      // Get franchise contacts from the meeting's client
      var extraContactTerms = '';
      if (contactPerson && contactPerson.trim()) {
        // Contact-specific search: from: or to: the person, plus client as anchor
        var cp = contactPerson.trim();
        var contactQ = '(from:' + cp + ' OR to:' + cp + ' OR ' + cp + ')';
        q = clientFirst ? clientFirst + ' ' + contactQ + ' newer_than:90d' : contactQ + ' newer_than:90d';
      } else if (clientFirst && topicKeywords.length) {
        // No contact: client AND topic keywords (existing behavior)
        q = clientFirst + ' (' + topicKeywords.join(' OR ') + ') newer_than:90d';
      } else if (clientFirst) {
        q = clientFirst + ' newer_than:90d';
      } else if (topicKeywords.length) {
        q = topicKeywords.join(' AND ') + ' newer_than:90d';
      } else {
        callback(null); return;
      }
      var listUrl = 'https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=6&q=' + encodeURIComponent(q);
      fetch(listUrl, { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data || !data.messages || !data.messages.length) { callback(null); return; }
          // Fetch metadata for each message (subject, from, snippet)
          var ids = data.messages.slice(0, 5).map(function(m) { return m.id; });
          return Promise.all(ids.map(function(id) {
            return fetch('https://www.googleapis.com/gmail/v1/users/me/messages/' + id + '?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date', {
              headers: { 'Authorization': 'Bearer ' + token }
            }).then(function(r) { return r.ok ? r.json() : null; });
          }));
        })
        .then(function(messages) {
          if (!messages) { callback(null); return; }
          var result = messages.filter(Boolean).map(function(msg) {
            var headers = (msg.payload && msg.payload.headers) || [];
            var getH = function(name) { return (headers.find(function(h){return h.name===name;})||{}).value||''; };
            return {
              subject: getH('Subject'),
              from: getH('From'),
              date: getH('Date'),
              snippet: msg.snippet || ''
            };
          }).filter(function(m) { return m.subject; });
          callback(result.length ? result : null);
        })
        .catch(function() { callback(null); });
    });
  };

  // ── Email search ────────────────────────────────────────────
  window._searchEmailsForTasks=function(cls,cb){window._gcalEnsureToken(function(tok){if(!tok){cb(null);return;}var franchises=cls.filter(function(c){return['ACTIVE','CLIENT'].includes(c.status)&&c.clientType==='Franquicia';}).slice(0,5);
      if(!franchises.length)franchises=cls.filter(function(c){return['ACTIVE','CLIENT'].includes(c.status);}).slice(0,4);
      var ns=franchises.map(function(c){return(c.businessName||c.name).split(' ')[0];}).filter(function(n){return n.length>2;});
      franchises.forEach(function(c){(c.contacts||[]).slice(0,3).forEach(function(ct){var fn=(ct.name||'').split(' ')[0];if(fn.length>2&&ns.indexOf(fn)===-1)ns.push(fn);});});

        localStorage.setItem('lbp_last_save', saveTime.toString());
        var stamped = Object.assign({}, merged, { _cloudSaveTime: saveTime });
        console.log('[LBP SYNC] PUSHING to cloud, _cloudSaveTime='+saveTime);
        _workerFetch('/sync', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({syncKey: syncKey, data: stamped})
        }).then(function(r){ console.log('[LBP SYNC] Push result:', r && r.status); });
      };
      console.log('[LBP SYNC] Pulling cloud before push...');
      _workerFetch('/sync?key=' + encodeURIComponent(syncKey))
        .then(function(res) { return res && res.ok ? res.json() : null; })
        .then(function(json) {
          var cloudData = (json && json.data && json.data._cloudSaveTime) ? json.data : null;
          if (cloudData) _lastKnownCloudData = cloudData;
          console.log('[LBP SYNC] Cloud cloudSaveTime='+(cloudData?cloudData._cloudSaveTime:'none')+' local lbp_last_save='+localStorage.getItem('lbp_last_save'));
          var merged = cloudData ? _mergeCloudData(toSync, cloudData) : toSync;
          var mergeChanged = merged !== toSync;
          console.log('[LBP SYNC] Merge changed local?', mergeChanged);
          if (mergeChanged) {
            localStorage.setItem('lbp2026_data', JSON.stringify(merged));
            window.dispatchEvent(new Event('lbp_cloud_sync'));
          }
          _push(merged);
        })
        .catch(function(e) { console.warn('[LBP SYNC] Pull failed, pushing anyway:', e); _push(toSync); });
    }, 2000);
  };

  // Flush pending sync on tab close/hide — merges with last known cloud snapshot first
  window._flushCloudSync = function() {
    if (!_syncTimer || !_pendingSyncData) return;
    clearTimeout(_syncTimer);
    _syncTimer = null;
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL) return;
    var saveTime = Date.now();
    // Pre-stamp before merge (same as _cloudSync timer — ensures local edits win per-item)
    var preStamped = _stampUpdatedAt(_pendingSyncData, saveTime);
    var toFlush = _mergeCloudData(preStamped, _lastKnownCloudData);
    _pendingSyncData = null;
    localStorage.setItem('lbp_last_save', saveTime.toString());
    var stamped = Object.assign({}, toFlush, { _cloudSaveTime: saveTime });
    var payload = JSON.stringify({ syncKey: syncKey, data: stamped });
    if (navigator.sendBeacon) {
      navigator.sendBeacon(window.LBP_WORKER_URL + '/sync', new Blob([payload], { type: 'application/json' }));
    } else {
      fetch(window.LBP_WORKER_URL + '/sync', { method: 'POST', headers: {'Content-Type':'application/json'}, body: payload, keepalive: true }).catch(function(){});
    }
  };

  // Batch-buffered cloud alarm scheduler — collects all alarms from a scheduleAlarms run
  // and flushes them in ONE request instead of one request per alarm.
  var _cloudAlarmBuffer = [];
  var _cloudAlarmFlushTimer = null;
  function _flushCloudAlarms() {
    _cloudAlarmFlushTimer = null;
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL || _cloudAlarmBuffer.length === 0) { _cloudAlarmBuffer = []; return; }
    var alarms = _cloudAlarmBuffer.slice();
    _cloudAlarmBuffer = [];
    console.log('[LBP] Flushing', alarms.length, 'alarms to cloud in one batch');
    _workerFetch('/alarms/batch', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({syncKey: syncKey, alarms: alarms})
    }).then(function(r) {
      if (!r) console.warn('[LBP] Cloud alarm batch: network error');
      else if (r.ok) console.log('[LBP] Cloud alarm batch OK, count:', alarms.length);
      else console.warn('[LBP] Cloud alarm batch failed, HTTP:', r.status);
    }).catch(function(e) { console.error('[LBP] Cloud alarm batch error:', e); });
  }
  window._cloudScheduleAlarm = function(alarmId, triggerAt, title, body, vibration) {
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL) {
      console.warn('[LBP] _cloudScheduleAlarm skipped — missing syncKey or workerUrl');
      return;
    }
    // Deduplicate by alarmId (last write wins)
    _cloudAlarmBuffer = _cloudAlarmBuffer.filter(function(a){ return a.alarmId !== alarmId; });
    _cloudAlarmBuffer.push({ alarmId: alarmId, triggerAt: triggerAt, title: title, body: body, vibration: vibration || 'long' });
    if (_cloudAlarmFlushTimer) clearTimeout(_cloudAlarmFlushTimer);
    _cloudAlarmFlushTimer = setTimeout(_flushCloudAlarms, 800);
  };

  // Cancel a cloud alarm
  window._cloudCancelAlarm = function(alarmId) {
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL) return;
    _workerFetch('/alarm?key=' + encodeURIComponent(syncKey) + '&id=' + encodeURIComponent(alarmId), {method:'DELETE'});
  };

  // Register push subscription with the cloud Worker
  function _registerPush(reg, forceNew) {
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL || !reg.pushManager) return;
    var key = window.LBP_VAPID_KEY;
    var b64 = key.replace(/-/g,'+').replace(/_/g,'/');
    while (b64.length % 4) b64 += '=';
    var appKey = Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });

    var doSubscribe = function() {
      return reg.pushManager.subscribe({userVisibleOnly: true, applicationServerKey: appKey});
    };

    var getOrCreate = forceNew
      ? reg.pushManager.getSubscription().then(function(ex) {
          return ex ? ex.unsubscribe().then(doSubscribe) : doSubscribe();
        })
      : reg.pushManager.getSubscription().then(function(ex) {
          return ex ? Promise.resolve(ex) : doSubscribe();
        });

    getOrCreate.then(function(sub) {
      if (!sub) return;
      return _workerFetch('/subscribe', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({syncKey: syncKey, subscription: sub.toJSON()})
      });
    }).then(function() {
      localStorage.setItem('lbp_push_registered', '1');
    }).catch(function() {
      localStorage.removeItem('lbp_push_registered');
    });
  }

  // ── Push health check: verify this device's subscription is still in Cloudflare KV ──
  // Runs on startup, on visibilitychange, and every 30 min.
  // If the subscription was silently expired and removed from KV by the cron worker,
  // this re-registers automatically so cloud pushes resume without user action.
  window._checkPushHealth = function() {
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL || Notification.permission !== 'granted') return;
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.ready.then(function(reg) {
      if (!reg.pushManager) return;
      reg.pushManager.getSubscription().then(function(sub) {
        if (!sub) {
          // No local subscription at all — create one
          _registerPush(reg, false);
          return;
        }
        // Ask worker if this endpoint is still registered in KV
        fetch(window.LBP_WORKER_URL + '/check-sub?key=' + encodeURIComponent(syncKey) + '&endpoint=' + encodeURIComponent(sub.endpoint))
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(result) {
            if (result && result.found === false) {
              // Subscription gone from KV (expired/deleted) — re-register silently
              console.log('[LBP] Push subscription not in KV, re-registering...');
              _registerPush(reg, false);
            }
          }).catch(function() {});
      }).catch(function() {});
    }).catch(function() {});
  };

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js')
        .then(function(reg) {
          window._swReg = reg;
          try {
            var pending = JSON.parse(localStorage.getItem('lbp_pending_alarms') || '[]');
            if (pending.length > 0) {
              navigator.serviceWorker.ready.then(function(r) {
                if (r.active) r.active.postMessage({type: 'CHECK_MISSED', alarms: pending});
              });
            }
          } catch(_e) {}
          // Keepalive carrying pending alarms so SW can reschedule if killed
          setInterval(function() {
            navigator.serviceWorker.ready.then(function(r) {
              if (!r.active) return;
              var _pa = [];
              try { _pa = JSON.parse(localStorage.getItem('lbp_pending_alarms') || '[]'); } catch(_e) {}
              r.active.postMessage({type: 'KEEPALIVE', alarms: _pa, workerUrl: window.LBP_WORKER_URL || '', syncKey: localStorage.getItem('lbp_sync_key') || ''});
            }).catch(function(){});
          }, 20000);
          // Register push subscription for cloud notifications
          if (Notification.permission === 'granted') _registerPush(reg);
          // Re-register when permission is granted later
          window._registerPush = function(_, forceNew) { _registerPush(reg, forceNew); };
          // Health check: verify subscription is still in KV (catches silently-expired subs)
          setTimeout(function() { if (window._checkPushHealth) window._checkPushHealth(); }, 8000);
          // Periodic health check every 30 minutes while app is open
          setInterval(function() { if (window._checkPushHealth) window._checkPushHealth(); }, 30 * 60 * 1000);
        })
        .catch(function(err) { console.warn('SW registration failed:', err); });
    });
    // Listen for SW signaling that the push subscription changed (pushsubscriptionchange)
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'PUSH_SUB_CHANGED') {
        // FCM invalidated the token -- re-register with fresh subscription
        console.log('[LBP] PUSH_SUB_CHANGED from SW, re-registering...');
        navigator.serviceWorker.ready.then(function(reg) {
          _registerPush(reg, true); // forceNew=true: unsubscribe old, create fresh
        }).catch(function() {});
      }
      if (e.data && e.data.type === 'ALARM_FIRED') {
        // Cloud push already showed this alarm — mark it so local check() skips it
        var aid = e.data.alarmId;
        if (!window._lbpFiredSet) window._lbpFiredSet = new Set();
        window._lbpFiredSet.add(aid);
        // Also store in localStorage so it survives a page reload within the same minute
        try {
          var fired = JSON.parse(localStorage.getItem('lbp_cloud_fired') || '[]');
          fired.push({ id: aid, t: Date.now() });
          // Keep only last 60 minutes worth
          var cutoff = Date.now() - 3600000;
          fired = fired.filter(function(x) { return x.t > cutoff; });
          localStorage.setItem('lbp_cloud_fired', JSON.stringify(fired));
        } catch(_) {}
      }
    });
    // Sync cloud-fired alarms from SW Cache API into localStorage.
    // When a push arrives with the app CLOSED, the SW stores the alarmId in Cache API
    // (lbp-fired-v1). On next open, we read those IDs here so check() skips re-firing.
    if ('caches' in window) {
      caches.open('lbp-fired-v1').then(function(cache) {
        return cache.keys().then(function(keys) {
          if (!keys.length) return;
          var fired2 = [];
          try { fired2 = JSON.parse(localStorage.getItem('lbp_cloud_fired') || '[]'); } catch(_) {}
          var now2 = Date.now(), cutoff2 = now2 - 3600000;
          var changed = false;
          keys.forEach(function(req) {
            var parts = req.url.split('/fired/');
            if (parts.length < 2) return;
            var id2 = decodeURIComponent(parts[1]);
            if (!id2) return;
            if (!window._lbpFiredSet) window._lbpFiredSet = new Set();
            window._lbpFiredSet.add(id2);
            if (!fired2.some(function(x) { return x.id === id2; })) {
              fired2.push({ id: id2, t: now2 }); changed = true;
            }
          });
          if (changed) {
            fired2 = fired2.filter(function(x) { return x.t > cutoff2; });
            localStorage.setItem('lbp_cloud_fired', JSON.stringify(fired2));
          }
          // Prune stale Cache entries
          return Promise.all(keys.map(function(req) {
            return cache.match(req).then(function(resp) {
              return resp ? resp.text().then(function(t2) {
                if (Number(t2) < cutoff2) return cache.delete(req);
              }) : null;
            });
          }));
        });
      }).catch(function() {});
    }
  }

  // Pull cloud data and smart-merge with local.
  // Cloud wins for existing items (that's the point of a pull).
  // Items that exist only in local (not yet pushed) are preserved.
  // force=true  → user clicked "Pull from Cloud" — skip INITIAL_DATA guard
  // force=false → auto-pull; skip only if local has real data and cloud is empty
  window._cloudPull = function(onDone, force) {
    var syncKey = localStorage.getItem('lbp_sync_key');
    if (!syncKey || !window.LBP_WORKER_URL) { if (onDone) onDone(false, 'missing config'); return; }
    _workerFetch('/sync?key=' + encodeURIComponent(syncKey))
      .then(function(res) { return res && res.json(); })
      .then(function(json) {
        if (!json || !json.data) { if (onDone) onDone(false, 'no data in cloud yet'); return; }
        // Guard: cloud has never been saved and local has data → skip (new device protection)
        if (!force && !json.data._cloudSaveTime && !!localStorage.getItem('lbp2026_data')) {
          if (onDone) onDone(false, 'cloud has no save timestamp — skipping to protect local data');
          return;
        }
        _lastKnownCloudData = json.data;
        var local = {};
        try { local = JSON.parse(localStorage.getItem('lbp2026_data') || '{}'); } catch(_e) {}

        var cloudSaveTime = json.data._cloudSaveTime || 0;
        var localLastSave = parseInt(localStorage.getItem('lbp_last_save') || '0', 10);
        var cloudIsNewer = cloudSaveTime > localLastSave;
        console.log('[LBP PULL] cloudSaveTime='+cloudSaveTime+' localLastSave='+localLastSave+' cloudIsNewer='+cloudIsNewer+' force='+force);

        var merged;
        if (force) {
          // User explicitly clicked "Pull from Cloud" — cloud wins for existing items
          // but never lose local-only new items or combined tombstones
          var allDeleted = Object.assign({}, (local._deletedIds || {}), (json.data._deletedIds || {}));
          allDeleted = window._pruneTombstones(allDeleted);
          merged = Object.assign({}, json.data, { _deletedIds: allDeleted });
          _SYNC_LISTS.forEach(function(k) {
            var cloudArr = (json.data[k] || []);
            var localArr = (local[k] || []);
            if (!localArr.length) return;
            var cloudIds = new Set(cloudArr.map(function(i) { return i && i.id; }));
            var localOnly = localArr.filter(function(i) { return i && i.id && !cloudIds.has(i.id) && !allDeleted[i.id]; });
            if (localOnly.length) merged[k] = cloudArr.concat(localOnly);
          });
        } else {
          // Auto-pull: use the same smart merge as _cloudSync.
          // If local was saved MORE RECENTLY than cloud, local wins for existing items —
          // this prevents auto-pull from overwriting edits the user just made.
          merged = _mergeCloudData(local, json.data);
        }

        // Preserve local alarm log entries not in cloud
        if (local.alarmLog && json.data.alarmLog) {
          var ids = new Set(((merged.alarmLog)||[]).map(function(a){return a.id;}));
          var extras = (local.alarmLog||[]).filter(function(a){return !ids.has(a.id);});
          if (extras.length) merged = Object.assign({}, merged, {alarmLog: (merged.alarmLog||[]).concat(extras)});
        }

        localStorage.setItem('lbp2026_data', JSON.stringify(merged));
        localStorage.setItem('lbp_last_sync', new Date().toISOString());
        // Only tell React to re-render if cloud actually had newer data.
        // Dispatch only if cloud had new data worth showing.
        // _mergeCloudData returns the exact `local` object (by reference) when nothing changed.
        // If it returned a new object, something was added/changed — tell React to re-render.
        if (cloudIsNewer || force || merged !== local) {
          window.dispatchEvent(new Event('lbp_cloud_sync'));
        }
        if (onDone) onDone(true);
      }).catch(function(e) { if (onDone) onDone(false, e && e.message ? e.message : 'network error'); });
  };
  // Flush on tab close / hide
  window.addEventListener('beforeunload', function() { if (window._flushCloudSync) window._flushCloudSync(); });
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden' && window._flushCloudSync) window._flushCloudSync();
    // Pull when app comes back to foreground, but only if no local sync is pending.
    // If _syncTimer is active the user just made edits — pulling would overwrite them.
    if (document.visibilityState === 'visible' && window._cloudPull && localStorage.getItem('lbp_worker_url') && !_syncTimer) {
      window._cloudPull(null, false);
    }
  });

  window.addEventListener('load', function() { window._cloudPull(null, false); }); // pull on first load
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --purple: #6B3FA0; --purple-light: #9C68D6; --purple-dim: #3D1F72;
    --gold: #C9A84C; --gold-light: #E8C97A;
    --rose: #D4658F;
    --green: #4CAF50; --orange: #FF9800; --red: #F44336; --blue: #2196F3;
    --bg: #1A1A2E; --surface: #16213E; --surface2: #0F3460;
    --text: #EAE8F0; --text-dim: #CAC4D8; --text-muted: #967EB4;
    --border: rgba(150,126,180,0.25);
    --card: rgba(255,255,255,0.05);
    --card-hover: rgba(255,255,255,0.08);
    --radius: 14px; --radius-sm: 8px; --radius-xs: 5px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border);
             padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
             position: sticky; top: 0; z-index: 100; }
  .top-bar h2 { font-size: 15px; color: var(--text-dim); font-weight: 400; }
  .top-bar .greeting { font-size: 17px; font-weight: 700; color: var(--text); }
  .main-area { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border);
             overflow-y: auto; flex-shrink: 0; padding: 16px 0; }
  .content { flex: 1; overflow-y: auto; padding: 0; }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .bottom-nav { display: flex !important; }
    .content { padding-bottom: 70px; }
  }
  .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0;
                background: var(--surface); border-top: 1px solid var(--border);
                z-index: 100; padding: 6px 0; }
  .bottom-nav button { flex: 1; background: none; border: none; color: var(--text-dim);
                       padding: 4px; cursor: pointer; display: flex; flex-direction: column;
                       align-items: center; gap: 2px; font-size: 10px; transition: color .2s; }
  .bottom-nav button.active { color: var(--purple-light); }
  .bottom-nav button svg { width: 22px; height: 22px; }

  /* Sidebar nav */
  .nav-section { padding: 8px 12px 4px; font-size: 10px; text-transform: uppercase;
                 letter-spacing: 1px; color: var(--text-muted); font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px;
              cursor: pointer; color: var(--text-dim); font-size: 13.5px; border-radius: 0;
              transition: all .15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(107,63,160,.2); color: var(--purple-light);
                     border-left-color: var(--purple-light); }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
  .nav-item .badge { margin-left: auto; background: var(--purple); color: #fff;
                     border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
          padding: 16px; transition: background .2s; }
  .card:hover { background: var(--card-hover); }
  .card-grid { display: grid; gap: 12px; }
  .card-grid-2 { grid-template-columns: 1fr 1fr; }
  .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-3-fixed { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 600px) { .card-grid-2, .card-grid-3 { grid-template-columns: 1fr; } }

  /* Page header */
  .page-header { padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }
  .page-header h1 { font-size: 22px; font-weight: 700; }
  .page-header .back-btn { background: var(--card); border: 1px solid var(--border);
                           color: var(--text-dim); padding: 6px 10px; border-radius: var(--radius-sm);
                           cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 4px; }
  .page-header .back-btn:hover { background: var(--card-hover); }
  .page-content { padding: 16px 24px 32px; }

  /* Buttons */
  .btn { border: none; border-radius: var(--radius-sm); padding: 8px 16px; cursor: pointer;
         font-size: 13px; font-weight: 600; transition: all .2s; display: inline-flex;
         align-items: center; gap: 6px; }
  .btn-primary { background: var(--purple); color: #fff; }
  .btn-primary:hover { background: var(--purple-light); }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { background: var(--card-hover); }
  .btn-danger { background: rgba(244,67,54,.15); color: var(--red); border: 1px solid rgba(244,67,54,.3); }
  .btn-success { background: rgba(76,175,80,.15); color: var(--green); border: 1px solid rgba(76,175,80,.3); }
  .btn-gold { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; border-radius: 8px; }

  /* Tags / chips */
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px;
          border-radius: 20px; font-size: 11px; font-weight: 600; }

  /* Progress */
  .progress-bar { height: 6px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }

  /* Form elements */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .form-group label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  input, textarea, select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: var(--radius-sm); font-size: 13px; width: 100%;
    outline: none; transition: border-color .2s; font-family: inherit; }
  input:focus, textarea:focus, select:focus { border-color: var(--purple-light); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface); }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500;
              display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
           width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 10; }
  .modal-header h3 { font-size: 16px; font-weight: 700; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; padding: 0 24px; margin-bottom: 16px;

  /* Stat card */

  /* Gradient hero */

  /* List items */
  .list-item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0;

  .list-item .item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex;

  /* Module grid */
  .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .module-grid { grid-template-columns: 1fr; } }
  .module-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
                 padding: 16px; cursor: pointer; transition: all .2s; display: flex;

  .module-card:hover { background: var(--card-hover); transform: translateY(-1px); }

  /* Quick action buttons */
  .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  @media (min-width: 900px) { .quick-actions { grid-template-columns: repeat(5, 1fr); } }
  .qa-btn { background: var(--card); border: 1px solid var(--border); color: var(--text);

            display: flex; align-items: center; justify-content: center; gap: 4px; transition: all .2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; flex-direction: column; line-height: 1.3; }

  /* Task item */

  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
                cursor: pointer; flex-shrink: 0; transition: all .2s; margin-top: 1px; }

  /* Mood selector */
  .mood-row { display: flex; gap: 8px; }

  /* Habit circle */
  .habit-circle { width: 54px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .habit-ring { width: 48px; height: 48px; border-radius: 50%; border: 3px solid; display: flex;

  /* Calendar grid */

                              border-radius: 50%; background: var(--gold); }

  /* Misc */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .empty-state h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; margin-bottom: 16px; }
  .text-sm { font-size: 12px; color: var(--text-dim); }
  .text-gold { color: var(--gold); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-purple { color: var(--purple-light); }
  .fw-bold { font-weight: 700; }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mb-4 { margin-bottom: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mt-8 { margin-top: 28px; }
  .w-full { width: 100%; }
  .row { display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase;
                   letter-spacing: .6px; margin-top: 28px; margin-bottom: 12px; display: flex; align-items: center;
                   justify-content: space-between; padding-bottom: 8px;
                   border-bottom: 1px solid var(--border); }
  .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; overflow-x: auto; }
  @media (max-width: 700px) { .kanban { grid-template-columns: 1fr; } }
  .kanban-col { background: var(--surface2); border-radius: var(--radius); padding: 12px; }
  .kanban-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
                      margin-bottom: 10px; padding: 4px 8px; border-radius: 6px; display: inline-block; }
  .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .month-btn { padding: 8px; text-align: center; border-radius: var(--radius-sm); cursor: pointer;
               font-size: 12px; font-weight: 600; background: var(--card); border: 1px solid var(--border);
               color: var(--text-dim); transition: all .2s; }
  .month-btn:hover { background: var(--card-hover); color: var(--text); }
  .month-btn.current { background: var(--purple); color: #fff; border-color: var(--purple); }
  input[type="range"] { accent-color: var(--purple-light); }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  .routine-item { display: flex; align-items: center; gap: 8px; padding: 5px 0;
                  border-bottom: 1px solid var(--border); font-size: 13px; }

  /* ═══════════════ RICH TEXT EDITOR ═══════════════ */
  .rte-wrap { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; min-width: 0; width: 100%; display: block; }
  .rte-wrap:focus-within { border-color: var(--purple-light); }
  .rte-toolbar { display: flex; gap: 2px; padding: 5px 7px; border-bottom: 1px solid var(--border);
                 background: rgba(0,0,0,.2); flex-wrap: wrap; align-items: center; }
  .rte-btn { background: rgba(255,255,255,.06); border: 1px solid rgba(150,126,180,.2);
             color: var(--text-dim); padding: 3px 8px; border-radius: 5px; cursor: pointer;
             font-size: 11px; font-weight: 600; transition: all .15s; line-height: 1.5;
             display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
  .rte-btn:hover { background: rgba(107,63,160,.35); color: var(--text); border-color: var(--purple); }
  .rte-btn.active { background: rgba(107,63,160,.4); color: var(--purple-light); border-color: var(--purple-light); }
  .rte-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
  .rte-body { min-height: 90px; padding: 10px 12px; outline: none; font-size: 13px;
              line-height: 1.75; background: var(--surface2); color: var(--text);
              overflow-wrap: break-word; word-wrap: break-word; word-break: break-word;
              width: 100%; box-sizing: border-box; display: block; white-space: normal; }
  .rte-body:empty::before { content: attr(data-placeholder); color: var(--text-muted); pointer-events: none; display: block; }
  .rte-body ul { padding-left: 22px; margin: 4px 0; list-style: disc; }
  .rte-body ol { padding-left: 22px; margin: 4px 0; list-style: decimal; }
  .rte-body li { margin: 3px 0; white-space: normal; }
  .rte-body ul, .rte-body ol { white-space: normal; }
  .rte-body blockquote { border-left: 3px solid var(--purple); padding-left: 10px; color: var(--text-dim); margin: 6px 0; }
  .rte-render { font-size: 13px; line-height: 1.75; }
  .rte-render ul { padding-left: 22px; margin: 4px 0; list-style: disc; }
  .rte-render ol { padding-left: 22px; margin: 4px 0; list-style: decimal; }
  .rte-render li { margin: 3px 0; white-space: normal; }
  .rte-render ul, .rte-render ol { white-space: normal; }
  .rte-render input[type=checkbox] { accent-color: var(--purple-light); margin-right: 5px; cursor: pointer; }
  .rte-render blockquote { border-left: 3px solid var(--purple); padding-left: 10px; color: var(--text-dim); }
  .checklist-item { display:flex!important; align-items:flex-start!important; gap:8px; margin:4px 0; white-space:normal!important; width:100%; box-sizing:border-box; min-width:0; }
  .checklist-item input[type=checkbox] { flex-shrink:0; margin-top:3px; accent-color:var(--purple-light); cursor:pointer; width:15px; height:15px; }
  .checklist-item label { flex:1!important; min-width:0!important; white-space:normal!important; overflow-wrap:break-word!important; word-break:break-word!important; cursor:text; line-height:1.6; }
  /* Native-list checklist: checkbox absolutely positioned, text indented — reliable on all mobile browsers */
  /* Checklist shared */
  .rte-body .rte-checklist, .rte-render .rte-checklist { list-style:none!important; padding-left:0!important; margin:4px 0; }
  /* Render view (static HTML, flex is reliable on all desktop/mobile browsers) */
  .rte-render .rte-checklist li { display:flex!important; align-items:flex-start!important; gap:6px!important; position:static!important; padding-left:0!important; margin:3px 0!important; white-space:normal!important; word-break:break-word!important; overflow-wrap:break-word!important; line-height:1.6; min-height:20px; box-sizing:border-box; }
  .rte-render .rte-checklist li input[type=checkbox] { position:static!important; flex-shrink:0!important; width:15px!important; height:15px!important; margin-top:3px!important; accent-color:var(--purple-light); cursor:pointer; }
  /* Editor view (contenteditable — absolute is the only reliable approach on mobile) */
  .rte-body .rte-checklist li { display:block!important; position:relative!important; padding-left:24px!important; margin:3px 0!important; white-space:normal!important; word-break:break-word!important; overflow-wrap:break-word!important; line-height:1.6; min-height:20px; box-sizing:border-box; }
  .rte-body .rte-checklist li input[type=checkbox] { position:absolute!important; left:0!important; top:3px!important; width:15px!important; height:15px!important; accent-color:var(--purple-light); cursor:pointer; }

  /* ═══════════════ ALARM PANEL ═══════════════ */
  .alarm-section { margin-bottom: 12px; }
  .alarm-toggle-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
                      background: rgba(107,63,160,.08); border: 1px solid rgba(107,63,160,.2);
                      border-radius: var(--radius-sm); cursor: pointer; user-select: none; transition: background .2s; }
  .alarm-toggle-row:hover { background: rgba(107,63,160,.15); }
  .alarm-toggle-row .alarm-icon { font-size: 16px; }
  .alarm-toggle-row span { font-size: 12px; color: var(--text-dim); font-weight: 500; flex: 1; }
  .alarm-toggle-row .alarm-badge { background: rgba(107,63,160,.3); color: var(--purple-light);
                                   border-radius: 12px; padding: 1px 8px; font-size: 10px; font-weight: 700; }
  .alarm-fields { background: rgba(107,63,160,.06); border: 1px solid rgba(107,63,160,.15);
                  border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); padding: 14px; }
  .alarm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 480px) { .alarm-grid { grid-template-columns: 1fr; } }
  .alarm-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700;
                color: var(--purple-light); background: rgba(107,63,160,.2); border-radius: 12px; padding: 2px 8px; }
  /* toggle switch */
  .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,.15);
                   border-radius: 20px; transition: .3s; }
  .toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px;
                           background: white; border-radius: 50%; transition: .3s; }
  .toggle-switch input:checked + .toggle-slider { background: var(--purple-light); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

  /* ═══════════════ MEDIA ATTACHMENTS ═══════════════ */

                color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 500;
                transition: all .15s; }
  .attach-btn:hover { background: var(--card-hover); border-color: var(--purple); color: var(--text); }
  .attach-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  .attach-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px;
                background: var(--card); border: 1px solid var(--border); border-radius: 8px;
                cursor: pointer; transition: background .15s, border-color .15s; user-select: none; }
  .attach-row:hover { background: var(--card-hover); border-color: var(--purple); }
  .attach-row .ar-icon { font-size: 17px; flex-shrink: 0; line-height: 1; }
  .attach-row .ar-name { font-size: 12px; color: var(--text-primary); flex: 1;
                          overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .attach-row .ar-del { background: none; border: none; color: var(--text-dim); cursor: pointer;
                         font-size: 16px; flex-shrink: 0; padding: 0 2px; line-height: 1; }
  .attach-row .ar-del:hover { color: var(--red); }
  /* keep media-thumb for journal read-only view */
  .media-grid { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }

  .media-thumb .m-icon { font-size: 17px; flex-shrink: 0; }
  .media-thumb .m-name { font-size: 12px; color: var(--text-primary); flex: 1;
                          overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .media-thumb .m-del { background: none; border: none; color: var(--text-dim); cursor: pointer;
                         font-size: 16px; flex-shrink: 0; padding: 0 2px; line-height: 1; }
  .media-thumb .m-del:hover { color: var(--red); }
  audio { width: 100%; margin-top: 4px; border-radius: 6px; }
  video { width: 100%; border-radius: 8px; margin-top: 6px; max-height: 220px; }

  /* ═══════════════ DRAWING CANVAS ═══════════════ */
  .draw-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 800;
                  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 16px; }
  .draw-canvas { background: #ffffff; border-radius: 12px; touch-action: none; cursor: crosshair;
                 max-width: min(95vw, 680px); width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
  .draw-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .draw-color-btn { width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
                    border: 3px solid transparent; transition: all .15s; flex-shrink: 0; }
  .draw-color-btn.sel { border-color: white; transform: scale(1.15); box-shadow: 0 0 0 2px rgba(255,255,255,.4); }
  .draw-size-btn { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff;
                   padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .draw-size-btn.sel { background: rgba(255,255,255,.35); }

  /* Notification toast */
  .notif-toast { position: fixed; top: 70px; right: 16px; z-index: 900; display: flex; flex-direction: column; gap: 8px; }
  .notif-card { background: var(--surface); border: 1px solid var(--purple); border-radius: var(--radius);
                padding: 12px 16px; max-width: 300px; box-shadow: var(--shadow);
                animation: slideIn .3s ease; }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .notif-card h4 { font-size: 13px; font-weight: 700; color: var(--purple-light); margin-bottom: 3px; }
  .notif-card p { font-size: 12px; color: var(--text-dim); }
  .notif-close { float: right; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; margin-left: 8px; }

  /* ─── Mobile hamburger / drawer ─── */

  @media(max-width:768px){.hamburger-btn{display:flex;align-items:center;justify-content:center;}}

  .nav-drawer{position:absolute;left:0;top:0;bottom:0;width:285px;background:var(--surface);

  @keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;
    padding:16px 16px 12px;border-bottom:1px solid var(--border);background:var(--surface2);
    position:sticky;top:0;z-index:1;}

  /* ─── Alarm full-screen overlay ─── */
  .alarm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .alarm-box{background:linear-gradient(135deg,#1a0a2e,#2d1b4e);

    animation:bellSwing .5s ease infinite alternate;}

  .alarm-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}

@keyframes lbp-rec-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(1.4);}}
  /* ─── Edit button ─── */
  .btn-edit{background:rgba(107,63,160,.2);border:1px solid rgba(107,63,160,.4);

    .page-content { padding: 10px 12px 80px; }

    .btn-edit { padding: 2px 6px; font-size: 11px; }
    .card { padding: 12px; }
  }

</style>
